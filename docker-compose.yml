services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: driveery
      POSTGRES_USER: driveery
      POSTGRES_PASSWORD: driveery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driveery -d driveery"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://driveery:driveery@db:5432/driveery
      OPENROUTER_API_KEY: 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
      OPENROUTER_MODEL: qwen/qwen3.6-plus
      SECRET_KEY: hackathon-driveery-2024
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"

volumes:
  pgdata:
